name: Setup Problem
description: Report a failed install, first-run, bridge, MIDI, or MCP client setup.
title: "[SETUP] "
labels:
  - type:doctor
  - area:installer
  - read-only
  - status:needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Run the setup doctor or the closest available read-only diagnostic first. Do not paste secrets or private MCP tokens.
  - type: textarea
    id: doctor-output
    attributes:
      label: Setup Doctor or diagnostic output
      description: Paste the full read-only setup diagnostic output.
      render: text
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5 / Windows 11
    validations:
      required: true
  - type: input
    id: fl-version
    attributes:
      label: FL Studio version and build
      placeholder: FL Studio Producer Edition v25.2.5 build 5055
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: mcp-client
    attributes:
      label: MCP client
      placeholder: ChatGPT Desktop / Claude Desktop / Cursor / other
    validations:
      required: false
  - type: dropdown
    id: bridge
    attributes:
      label: Bridge connection type
      options:
        - TCP daemon
        - Direct MIDI/SysEx
        - Unknown
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What failed?
      description: Describe the expected result and the actual failure.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: Remediation already tried
      description: Include MIDI port names, controller marker, `fl_transport(action="ping")`, and relevant logs if available.
    validations:
      required: false
