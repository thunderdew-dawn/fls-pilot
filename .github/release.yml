changelog:
  exclude:
    labels:
      - release:skip
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Safety And Release Gates
      labels:
        - release-blocker
        - area:safety
        - area:security
    - title: Features And Workflows
      labels:
        - type:feature
        - type:workflow
    - title: Fixes
      labels:
        - type:fix
    - title: Documentation And GitHub
      labels:
        - area:docs
        - area:github
        - type:github-sync
    - title: Dependencies
      labels:
        - dependencies
    - title: API And Compatibility
      labels:
        - area:api
        - api-dependent
        - api-limited
    - title: Other Changes
      labels:
        - "*"
