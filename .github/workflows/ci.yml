name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  bridge-smoke:
    name: Bridge smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall src scripts

      - name: Lint hard Python errors
        run: ruff check --select E9,F src scripts/test_bridge.py scripts/test_bridge_mock.py

      - name: Run mock bridge smoke test
        run: python scripts/test_bridge_mock.py
